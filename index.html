<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Wedding Photo Booth</title>

  <!-- PWA / mobile app -->
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FiltrosBoda" />
  <link rel="manifest" href="manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── SCREEN: CAMERA ── -->
  <div id="screen-camera" class="screen active">
    <div class="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <img id="filter-overlay" src="overlay.png" alt="" />
      <!-- Countdown -->
      <div id="countdown" class="countdown hidden"></div>
      <!-- "Flash" effect -->
      <div id="flash" class="flash hidden"></div>
    </div>

    <div class="controls-bar">
      <div class="action-row">
        <!-- Flip camera -->
        <button id="flip-btn" class="icon-btn" title="Voltear cámara">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 4v6h6M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
        </button>

        <!-- Capture button -->
        <button id="capture-btn" class="capture-btn">
          <span class="capture-ring"></span>
          <span class="capture-dot"></span>
        </button>

        <!-- Gallery button -->
        <button id="open-gallery-btn" class="icon-btn" title="Ver galería">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="m21 15-5-5L5 21"/>
          </svg>
          <span id="photo-count" class="badge hidden">0</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ── SCREEN: PREVIEW ── -->
  <div id="screen-preview" class="screen hidden">
    <div class="preview-wrap">
      <canvas id="preview-canvas"></canvas>
    </div>
    <div class="preview-actions">
      <button id="retake-btn" class="btn btn-outline">Repetir</button>
      <button id="save-btn" class="btn btn-primary">Guardar ✓</button>
    </div>
  </div>

  <!-- Background music (gallery) -->
  <audio id="bg-music" src="music.mp3" loop preload="auto"></audio>

  <!-- ── SCREEN: GALLERY ── -->
  <div id="screen-gallery" class="screen hidden">
    <div class="gallery-header">
      <button id="back-btn" class="btn-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
        Cámara
      </button>
      <h2>Galería</h2>
      <div class="gallery-header-right">
        <button id="music-btn" class="icon-btn music-btn" title="Música">
          <svg id="music-icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
          <svg id="music-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="hidden">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
            <line x1="2" y1="2" x2="22" y2="22"/>
          </svg>
        </button>
        <span id="gallery-count" class="gallery-count">0 fotos</span>
      </div>
    </div>

    <div id="photo-grid" class="photo-grid">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">📷</div>
        <p>Aún no hay fotos.<br>¡Sé el primero en tomar una!</p>
      </div>
    </div>
  </div>

  <!-- ── MODAL: PHOTO DETAIL ── -->
  <div id="photo-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <img id="modal-img" src="" alt="Foto" />
      <div class="modal-actions">
        <button id="download-btn" class="btn btn-primary">Descargar 📥</button>
        <button id="close-modal-btn" class="btn btn-outline">Cerrar</button>
      </div>
    </div>
  </div>

  <!-- ── MODAL: ADMIN PIN ── -->
  <div id="admin-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content admin-modal-content">
      <p class="admin-modal-title">Acceso restringido</p>
      <input id="admin-pin-input" type="password" inputmode="numeric" maxlength="8"
             class="admin-pin-input" placeholder="PIN" autocomplete="off" />
      <p id="admin-pin-error" class="admin-pin-error hidden">PIN incorrecto</p>
      <div class="modal-actions">
        <button id="admin-pin-cancel" class="btn btn-outline">Cancelar</button>
        <button id="admin-pin-confirm" class="btn btn-primary">Entrar</button>
      </div>
    </div>
  </div>

  <!-- Firebase (optional – fill in firebaseConfig in app.js to enable cross-device sharing) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script src="app.js"></script>
</body>
</html>
